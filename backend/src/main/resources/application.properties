spring.application.name=electiq-backend
server.port=${PORT:8080}
server.servlet.context-path=/api/v1
gemini.api.key=${GEMINI_API_KEY:}

# CORS: Comma-separated list of allowed origins.
# Override via ALLOWED_ORIGINS env var in Cloud Run.
# Defaults include local Vite dev server (5173 & 4173) + Firebase Hosting domains.
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:3000,https://electiq-devdesai.web.app,https://electiq-devdesai.firebaseapp.com}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN